# Codemagic CI/CD for Tower Defense 102
# App: https://github.com/mattypatty918-wq/tower-defense-102

workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      node: "18"
      xcode: "16.0"
      cocoapods: "1.15.2"
    artifacts:
      - build/ios/ipa/*.ipa
    scripts:
      - name: Install dependencies
        script: npm install && npx cap sync ios
      - name: Build iOS
        script: |
          cd ios/App && xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -archive archive App.xcarchive 2>&1 | tail -20
          xcodebuild -exportArchive -archive archive/App.xcarchive -exportPath ../build/ios/ipa -exportOptionsPlist ../ExportOptions.plist

  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      node: "18"
      java: "21"
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    scripts:
      - name: Build Android Release
        script: |
          export JAVA_HOME=/opt/java-21
          export ANDROID_HOME=/opt/android-sdk
          npx cap sync android && cd android && ./gradlew assembleRelease --no-daemon 2>&1 | tail -10